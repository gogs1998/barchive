name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      fix_dns:
        description: 'Run DNS fix for bariq.co.uk (requires Zone:DNS:Edit on token)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref_name == 'main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=barchive --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Wire custom domain to Pages + fix DNS (production only)
        if: github.ref_name == 'main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          ZONE_ID="8c7d3457d3b5b5f1c1be246798f9df11"

          for DOMAIN in "bariq.co.uk" "www.bariq.co.uk"; do
            echo "=== $DOMAIN ==="

            # Register custom domain on Pages (idempotent)
            curl -s -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DOMAIN\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains" \
              | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          errs=d.get('errors',[])
          if d.get('success'): print('  Pages domain: added')
          elif any(e.get('code') in (8000018,8000026) for e in errs): print('  Pages domain: already registered')
          else: print('  Pages domain error:', errs)
          " 2>/dev/null || true

            # Delete conflicting A/AAAA/CNAME records (requires Zone:DNS:Edit permission)
            DNS_CHECK=$(curl -s -w "HTTP_%{http_code}" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$DOMAIN&per_page=100")
            HTTP_CODE=$(echo "$DNS_CHECK" | grep -o "HTTP_[0-9]*" | cut -d_ -f2)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "$DNS_CHECK" | python3 -c "
          import sys,json
          raw=sys.stdin.read()
          body=raw[:raw.rfind('HTTP_')]
          d=json.loads(body)
          for r in d.get('result',[]):
              if r['type'] in ('A','AAAA','CNAME'):
                  print(r['id']+' '+r['type']+' '+str(r.get('content','')))
          " 2>/dev/null | while read RID RTYPE RCONTENT; do
                echo "  Deleting $RTYPE $RID ($RCONTENT)"
                curl -s -X DELETE \
                  -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                  "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RID" > /dev/null
              done
            else
              echo "  DNS API: HTTP $HTTP_CODE — token lacks Zone:DNS:Edit permission (see BAR-44)"
            fi

            # Report final domain status
            sleep 3
            curl -s \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains" \
              | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          for dom in d.get('result',[]):
              if dom['name']=='$DOMAIN':
                  print('  Status:', dom.get('status','unknown'))
          " 2>/dev/null || true
          done

  deploy-api:
    name: Deploy Backend (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            wrangler deploy --env production
          else
            wrangler deploy --env staging
          fi

      - name: Run D1 migrations
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DB="bariq-production"
          else
            DB="bariq-staging"
          fi
          for migration in migrations/d1/0001_initial_schema.sql \
                           migrations/d1/0002_auth_schema.sql \
                           migrations/d1/0003_favourites.sql \
                           migrations/d1/0004_user_bar.sql; do
            if [ -f "$migration" ]; then
              echo "Applying $migration to $DB..."
              wrangler d1 execute "$DB" --remote --file "$migration"
            else
              echo "Skipping $migration (not found)"
            fi
          done

      - name: Smoke test health endpoint
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            API_URL="https://bariq.co.uk"
          else
            API_URL="${{ secrets.STAGING_API_URL }}"
          fi
          for i in $(seq 1 10); do
            STATUS=$(curl -sf "$API_URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed: $API_URL/health"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 50s: $API_URL/health"
          exit 1
