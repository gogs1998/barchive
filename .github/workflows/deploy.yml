name: Deploy

on:
  push:
    branches: [main, staging]

# Only run one deploy per branch at a time; cancel older runs
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref_name == 'main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=barchive --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Wire custom domain to Pages (production only)
        if: github.ref_name == 'main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          ZONE_ID="8c7d3457d3b5b5f1c1be246798f9df11"

          for DOMAIN in "bariq.co.uk" "www.bariq.co.uk"; do
            echo "=== Wiring $DOMAIN ==="

            # Step 1: Add custom domain to Pages project
            echo "Adding $DOMAIN to Pages project..."
            RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DOMAIN\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains")
            HTTP_STATUS=$(echo "$RESULT" | grep "HTTP_STATUS:" | cut -d: -f2)
            BODY=$(echo "$RESULT" | grep -v "HTTP_STATUS:")
            echo "HTTP $HTTP_STATUS: $BODY" | head -c 300

            # Step 2: Delete conflicting A/CNAME DNS records
            echo ""
            echo "Deleting conflicting DNS records for $DOMAIN..."
            DNS_RECORDS=$(curl -s \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$DOMAIN&per_page=100")
            echo "DNS records response:" $(echo "$DNS_RECORDS" | python3 -c "import sys,json; d=json.load(sys.stdin); print('count:', len(d.get('result',[])), 'success:', d.get('success'))" 2>/dev/null)

            echo "$DNS_RECORDS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          records = data.get('result', [])
          for r in records:
              rtype = r.get('type','')
              if rtype in ('A', 'AAAA', 'CNAME'):
                  print(rtype + ':' + r['id'] + ':' + str(r.get('content','')))
          " 2>/dev/null | while IFS=: read RTYPE RID RCONTENT; do
              echo "Deleting $RTYPE record $RID ($RCONTENT) for $DOMAIN..."
              DEL=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X DELETE \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RID")
              echo "Delete result: $(echo "$DEL" | grep "HTTP_STATUS:")"
            done

            # Step 3: Check domain status
            sleep 5
            STATUS=$(curl -s \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains" \
              | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          for dom in d.get('result',[]):
              if dom['name']=='$DOMAIN':
                  print(dom.get('status','unknown'))
          " 2>/dev/null || echo "unknown")
            echo "$DOMAIN final status: $STATUS"
          done
          set +e

  deploy-api:
    name: Deploy Backend (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            wrangler deploy --env production
          else
            wrangler deploy --env staging
          fi

      - name: Run D1 migrations
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DB="bariq-production"
          else
            DB="bariq-staging"
          fi
          for migration in migrations/d1/0001_initial_schema.sql \
                           migrations/d1/0002_auth_schema.sql \
                           migrations/d1/0003_favourites.sql \
                           migrations/d1/0004_user_bar.sql; do
            if [ -f "$migration" ]; then
              echo "Applying $migration to $DB..."
              wrangler d1 execute "$DB" --remote --file "$migration"
            else
              echo "Skipping $migration (not found)"
            fi
          done

      - name: Smoke test health endpoint
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            API_URL="https://bariq.co.uk"
          else
            API_URL="${{ secrets.STAGING_API_URL }}"
          fi
          for i in $(seq 1 10); do
            STATUS=$(curl -sf "$API_URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed: $API_URL/health"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 50s: $API_URL/health"
          exit 1
