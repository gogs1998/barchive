name: Deploy

on:
  push:
    branches: [main, staging]

# Only run one deploy per branch at a time; cancel older runs
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref_name == 'main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=barchive --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Add custom domain to Pages project (production only)
        if: github.ref_name == 'main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          for DOMAIN in "bariq.co.uk" "www.bariq.co.uk"; do
            echo "Ensuring $DOMAIN is a custom domain on the barchive Pages project..."
            RESULT=$(curl -sf -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DOMAIN\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains" 2>&1)
            echo "$RESULT" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              if d.get('success'):
                  print('  Added successfully')
              else:
                  errs = d.get('errors', [])
                  # Code 8000026 = domain already exists — that's fine
                  if any(e.get('code') == 8000026 for e in errs):
                      print('  Already configured (skipping)')
                  else:
                      print('  Warning:', errs)
          except Exception as e:
              print('  Could not parse response:', e)
          " || true
          done

  deploy-api:
    name: Deploy Backend (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            wrangler deploy --env production
          else
            wrangler deploy --env staging
          fi

      - name: Run D1 migrations
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DB="bariq-production"
          else
            DB="bariq-staging"
          fi
          # Run all migrations in order; all use IF NOT EXISTS so they are idempotent
          for migration in migrations/d1/0001_initial_schema.sql \
                           migrations/d1/0002_auth_schema.sql \
                           migrations/d1/0003_favourites.sql \
                           migrations/d1/0004_user_bar.sql; do
            if [ -f "$migration" ]; then
              echo "Applying $migration to $DB..."
              wrangler d1 execute "$DB" --remote --file "$migration"
            else
              echo "Skipping $migration (not found)"
            fi
          done

      - name: Smoke test health endpoint
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            API_URL="https://bariq.co.uk"
          else
            API_URL="${{ secrets.STAGING_API_URL }}"
          fi
          for i in $(seq 1 10); do
            STATUS=$(curl -sf "$API_URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed: $API_URL/health"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 50s: $API_URL/health"
          exit 1
