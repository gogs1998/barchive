name: Deploy

on:
  push:
    branches: [main, staging]

# Only run one deploy per branch at a time; cancel older runs
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref_name == 'main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=barchive --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Wire custom domain to Pages (production only)
        if: github.ref_name == 'main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          ZONE_ID="8c7d3457d3b5b5f1c1be246798f9df11"

          for DOMAIN in "bariq.co.uk" "www.bariq.co.uk"; do
            echo "=== Wiring $DOMAIN ==="

            # 1. Add custom domain to Pages project (idempotent)
            RESULT=$(curl -sf -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DOMAIN\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains" 2>&1 || true)
            echo "Pages domain add: $(echo "$RESULT" | python3 -c "
          import sys,json
          try:
              d=json.loads(sys.stdin.read())
              errs=d.get('errors',[])
              if d.get('success'): print('added')
              elif any(e.get('code')==8000026 for e in errs): print('already exists')
              else: print('warn:', errs)
          except: print('non-json response')
          " 2>/dev/null || echo "parse error")"

            # 2. Delete any A/CNAME records that would override Pages routing
            for TYPE in A CNAME; do
              IDS=$(curl -sf \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$DOMAIN&type=$TYPE" \
                | python3 -c "import sys,json; [print(r['id']) for r in json.load(sys.stdin).get('result',[])]" 2>/dev/null || true)
              for RID in $IDS; do
                echo "Deleting $TYPE $RID for $DOMAIN"
                curl -sf -X DELETE \
                  -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                  "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RID" > /dev/null 2>&1 || true
              done
            done

            # 3. Cloudflare Pages manages its own CNAME — verify domain status
            sleep 3
            STATUS=$(curl -sf \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/barchive/domains" \
              | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          for dom in d.get('result',[]):
              if dom['name']=='$DOMAIN':
                  print(dom.get('status','unknown'))
          " 2>/dev/null || echo "unknown")
            echo "$DOMAIN status: $STATUS"
          done

  deploy-api:
    name: Deploy Backend (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            wrangler deploy --env production
          else
            wrangler deploy --env staging
          fi

      - name: Run D1 migrations
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DB="bariq-production"
          else
            DB="bariq-staging"
          fi
          for migration in migrations/d1/0001_initial_schema.sql \
                           migrations/d1/0002_auth_schema.sql \
                           migrations/d1/0003_favourites.sql \
                           migrations/d1/0004_user_bar.sql; do
            if [ -f "$migration" ]; then
              echo "Applying $migration to $DB..."
              wrangler d1 execute "$DB" --remote --file "$migration"
            else
              echo "Skipping $migration (not found)"
            fi
          done

      - name: Smoke test health endpoint
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            API_URL="https://bariq.co.uk"
          else
            API_URL="${{ secrets.STAGING_API_URL }}"
          fi
          for i in $(seq 1 10); do
            STATUS=$(curl -sf "$API_URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed: $API_URL/health"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 50s: $API_URL/health"
          exit 1
