name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  api-test:
    # Backend has been ported to Cloudflare Workers + D1 (BAR-12).
    # Tests run against an aiosqlite stub — no PostgreSQL service needed.
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: apps/api

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
        run: pytest tests/test_worker.py --cov=src --cov-fail-under=80
        working-directory: apps/api

  web-test:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Type check
        run: npm run type-check
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Unit tests
        run: npm run test:coverage
        working-directory: apps/web

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [web-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Start server
        # next start does not work with output: export; use serve to host the static out/ dir
        run: npx serve@latest out --listen 3000 &
        working-directory: apps/web

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break || sleep 2
          done
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
