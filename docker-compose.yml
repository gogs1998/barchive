version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: barchive
      POSTGRES_PASSWORD: barchive
      POSTGRES_DB: barchive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://barchive:barchive@postgres:5432/barchive
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
