[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["app", "main"]
omit = ["tests/*"]

[dependency-groups]
dev = [
    "aiosqlite>=0.22.1",
    "authlib>=1.7.2",
    "bcrypt>=5.0.0",
    "fastapi>=0.136.1",
    "httpx>=0.28.1",
    "passlib>=1.7.4",
    "pydantic[email]>=2.13.4",
    "pydantic-settings>=2.14.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "python-jose>=3.5.0",
    "sqlalchemy>=2.0.49",
    "email-validator>=2.3.0",
    "greenlet>=3.5.0",
]
