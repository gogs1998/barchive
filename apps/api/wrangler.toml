name = "bariq-api"
main = "src/worker.py"
compatibility_date = "2024-12-18"
compatibility_flags = ["python_workers"]

# Default / local dev — uses a local D1 simulation
[[ d1_databases ]]
binding = "DB"
database_name = "bariq-dev"
database_id = "local"

[vars]
ENVIRONMENT = "development"
# ALLOWED_ORIGIN, JWT_SECRET, RESEND_API_KEY, BASE_URL must be set as Cloudflare secrets
# for staging and production (wrangler secret put JWT_SECRET --env production).
# For local dev these can be set via a .dev.vars file (not committed).
ALLOWED_ORIGIN = "http://localhost:3000"
BASE_URL = "http://localhost:3000"

# ── Staging ─────────────────────────────────────────────────────────────────
[env.staging]
name = "bariq-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGIN = "https://bariq.co.uk"
BASE_URL = "https://bariq.co.uk"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "bariq-staging"
database_id = "a1965723-88c2-497c-b100-095b80df59c6"

# ── Production ──────────────────────────────────────────────────────────────
[env.production]
name = "bariq-api"
# Worker only handles /api/* and /health — all other paths served by Cloudflare Pages
# zone_id for bariq.co.uk: 8c7d3457d3b5b5f1c1be246798f9df11
[[env.production.routes]]
pattern = "bariq.co.uk/api/*"
zone_id = "8c7d3457d3b5b5f1c1be246798f9df11"

[[env.production.routes]]
pattern = "bariq.co.uk/health"
zone_id = "8c7d3457d3b5b5f1c1be246798f9df11"

[[env.production.routes]]
pattern = "www.bariq.co.uk/api/*"
zone_id = "8c7d3457d3b5b5f1c1be246798f9df11"

[[env.production.routes]]
pattern = "www.bariq.co.uk/health"
zone_id = "8c7d3457d3b5b5f1c1be246798f9df11"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://bariq.co.uk"
BASE_URL = "https://bariq.co.uk"
# JWT_SECRET and RESEND_API_KEY are stored as Cloudflare secrets, not in this file.

[[env.production.d1_databases]]
binding = "DB"
database_name = "bariq-production"
database_id = "5b0eba5c-f049-4d89-ad80-4b8b4e77f407"
