name = "bariq-api"
main = "src/worker.py"
compatibility_date = "2024-12-18"
compatibility_flags = ["python_workers"]

# Default / local dev — uses a local D1 simulation
[[ d1_databases ]]
binding = "DB"
database_name = "bariq-dev"
database_id = "local"

[vars]
ENVIRONMENT = "development"

# ── Staging ─────────────────────────────────────────────────────────────────
[env.staging]
name = "bariq-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "bariq-staging"
database_id = "a1965723-88c2-497c-b100-095b80df59c6"

# ── Production ──────────────────────────────────────────────────────────────
[env.production]
name = "bariq-api"
# DNS transfer to Cloudflare confirmed complete (NS: ishaan/mira.ns.cloudflare.com)
# Using zone_id to avoid "externally managed DNS records" error (wrangler code 100117).
# zone_id for bariq.co.uk: 8c7d3457d3b5b5f1c1be246798f9df11
[[env.production.routes]]
pattern = "bariq.co.uk/*"
zone_id = "8c7d3457d3b5b5f1c1be246798f9df11"

[[env.production.routes]]
pattern = "www.bariq.co.uk/*"
zone_id = "8c7d3457d3b5b5f1c1be246798f9df11"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "bariq-production"
database_id = "5b0eba5c-f049-4d89-ad80-4b8b4e77f407"
